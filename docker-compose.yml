services:
  flowproxy:
    build: .
    container_name: flowproxy
    restart: unless-stopped
    network_mode: host
    environment:
      - ADMIN_ADDR=0.0.0.0:${ADMIN_PORT:-9000}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?set ADMIN_USERNAME in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - HTTP_ADDR=:${PROXY_HTTP_PORT:-80}
      - HTTPS_ADDR=:${PROXY_HTTPS_PORT:-443}
      - DATA_FILE=/data/sites.json
      - SETTINGS_FILE=/data/settings.json
      - CERT_DATA_FILE=/data/certificates.json
      - CERT_DIR=/data/certs
      - ENABLE_AUTO_TLS=true
      - LETSENCRYPT_EMAIL=admin@example.com
    volumes:
      - ./data:/data
